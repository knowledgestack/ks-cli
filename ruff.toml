target-version = "py314"
line-length = 88
src = ["src", "tests"]

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "codegen",
    "alembic/versions/*",
    "docs/*",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "T10", # flake8-debugger
    "G",   # flake8-logging-format
    "PIE", # flake8-pie
    "PT",  # flake8-pytest-style
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate
    "PD",  # pandas-vet
    "PGH", # pygrep-hooks
    "PL",  # Pylint
    "RUF", # Ruff-specific rules
    "D",   # pydocstyle
]

ignore = [
    "D100",    # Missing docstring in public module
    "D101",    # Missing docstring in public class
    "D102",    # Missing docstring in public method
    "D103",    # Missing docstring in public function
    "D104",    # Missing docstring in public package
    "D105",    # Missing docstring in magic method
    "D106",    # Missing docstring in public nested class
    "D107",    # Missing docstring in __init__
    "D203",    # 1 blank line required before class docstring
    "D213",    # Multi-line docstring summary should start at the second line
    "PLR0913", # Too many arguments to function call
    "PLC0414", # Import alias does not rename original package
    "E501",    # Line too long (handled by formatter when possible)
    "B008",    # Function call in default argument (common in FastAPI)
    "B904",    # raise from None
    "ERA001",  # Commented out code
    "G201",    # Use the logger's error method instead of exception()
]

fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"**/__init__.py" = ["F401", "F403"] # Allow unused imports in __init__.py
"**/tests/**/*.py" = [
    "S101",    # Allow assert in tests
    "ARG",     # Unused arguments in tests (fixtures)
    "FBT",     # Don't care about booleans in tests
    "PLR2004", # Allow magic values in tests
    "PLC0415", # Don't require top-level imports in tests
]
"**/e2e/**/*.py" = [
    "S101",    # Allow assert in tests
    "ARG",     # Unused arguments in tests (fixtures)
    "FBT",     # Don't care about booleans in tests
    "PLR2004", # Allow magic values in tests
    "PLC0415", # Don't require top-level imports in tests
    "PLR0915", # Test method with many steps
]


[lint.isort]
known-first-party = ["shared_utils", "database_schema", "private_api_client"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]
force-wrap-aliases = true
combine-as-imports = true

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
